<!DOCTYPE html>
<html lang="en">

<head>
    <title></title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        /* In order to place the tracking correctly */
        canvas.drawing,
        canvas.drawingBuffer {
            position: absolute;
            left: 0;
            top: 0;
        }

        html,
        body {
            height: 100%;
            /* IMPORTANT!!! Stretches viewport to 100% */
        }
    </style>
    <script src="html5-qrcode.min.js"></script>
</head>

<body>
    <!-- Div to show the scanner -->
    <div id="reader"></div>
    <script>
        //refer doc here https://github.com/mebjas/html5-qrcode
        const formatsToSupport = [
            Html5QrcodeSupportedFormats.QR_CODE,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.UPC_E,
            Html5QrcodeSupportedFormats.UPC_EAN_EXTENSION,
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.EAN_8,
            Html5QrcodeSupportedFormats.EAN_13,
        ];
        const html5QrCode = new Html5Qrcode("reader", { formatsToSupport });
        console.log("Starting SCANNING CODE");
        const qrCodeSuccessCallback = (decodedText, decodedResult) => {
            /* handle success for web */
            window.parent.postMessage(decodedText, "*");

            /* handle success for window */
            if (window.chrome.webview != "undefined") {
                var param = {
                    "methodName": "successCallback",
                    "data": decodedText
                }
                window.chrome.webview.postMessage(param);
            }

        };
        const config = {
            fps: 24,
            qrbox: {
                width: 500,
                height: 250,
            },
            videoConstraints: {
                facingMode: { exact: "environment"},
                focusMode: { exact: "continuous" },
                width: { ideal: 1920 },
                height: { ideal: 1080 }
            }
        };

        html5QrCode.start({
            facingMode: {exact: "environment"}
        }, config, qrCodeSuccessCallback);

        //Window event listener
        if (window.chrome.webview != undefined) {
            window.chrome.webview.addEventListener('message', function (e) {
                let data = JSON.parse(JSON.stringify(e.data));
                if (data.event === "close") {
                    html5QrCode.stop();
                }
            });
        }
    </script>
</body>

</html>
